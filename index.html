<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScaleX | The Ultimate Tech Solutions</title>

    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="ScaleX-logo.png" type="image/x-icon" />
  </head>

  <body>
    <div class="container">
      <header class="navbar">
        <div class="logo">
          <img src="ScaleX-logo.png" alt="ScaleX Logo" />
        </div>

        <nav class="nav-links">
          <a href="#">Home</a>
          <a href="#">About Us</a>
          <a href="#">Blogs</a>
          <a href="#">Contact Us</a>
        </nav>

        <div class="nav-btn">
          <button>Get Started</button>
        </div>
      </header>
      <main class="hero">
        <h1 class="hero-title">Insights & Blogs</h1>

        <div class="category-buttons">
          <button class="active">All</button>
          <button>Tech</button>
          <button>SaaS</button>
          <button>Marketing</button>
        </div>
        <section class="blog-section">
          <!-- Card 1 -->
          <article class="blog-card">
            <div class="card-image">
               <img src="https://images.squarespace-cdn.com/content/v1/680f921dcceec04972a7e448/5136a977-d9db-4cdc-86b5-757e74bf0ae1/HGCFO+(11).jpeg" alt="Blog Image">
            </div>

            <div class="card-content">
              <span class="card-category"> Tech </span>
              <h2 class="card-title">The Ultimate Guide To SaaS Marketing</h2>
              <p class="card-date">May 23, 2025</p>
            </div>
          </article>

          <!-- Card 2 -->

          <article class="blog-card">
            <div class="card-image">    
               <img src="https://assets.lummi.ai/assets/QmaLJLztpwec5dhRriuXGij4xsiR4EvtPiLvKMi7b2u7qe?auto=format&w=640" alt="Blog Image">
            </div>
            <div class="card-content">
              <span class="card-category"> SaaS </span>
              <h2 class="card-title">5 Key Trends In SaaS Growth For 2025</h2>
              <p class="card-date">May 23, 2025</p>
            </div>
          </article>

          <!-- Card 3 -->

          <article class="blog-card">
            <div class="card-image">
               <img src="https://img.freepik.com/premium-photo/minimalist-cute-cat-photography-solid-background-wallpaper-design_1058532-18325.jpg" alt="Blog Image">
            </div>
            <div class="card-content">
              <span class="card-category"> Marketing </span>
              <h2 class="card-title">
                How Data-Driven Strategies Are Important
              </h2>
              <p class="card-date">May 23, 2025</p>
            </div>
          </article>
        </section>
      </main>
    </div>
  </body>
</html>
